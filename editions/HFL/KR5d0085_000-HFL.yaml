front:
  text: 進洞天海嶽表虔州大中祥符宮道士臣李思聰臣竊以琅函翠札玉岌紫書卷帳頗繁尋譯彌廣粵若三清奧妙之典煥乎五嶽真形之圖古存闈苑之文今有十洲之記真風綿邈史氏弗論歷代英儒罕留編錄臣每因朝修之暇焚灶之餘密扣幽微輒排次序雖丹臺廈遠紫府幽深具載畫圖豁如指掌使崇上之士同贊國風味道之流上祝宸籌忝遇泰寧之運式揚清淨之風博採仙圖久歸上聖臣誠惶誠恐頓首頓首恭惟體天法道欽文聰武神聖孝德皇帝陛下執祥符而御曆握金鑑以臨民道冠百王德降千古堯雲庇野萬彙昭蘇舜日麗天八絃和煦遂遣東夷南越之俗稽顆歸仁北胡西虜之民傾心順化凡遭聖運盡罄惟深切念臣幼年以來苦心本教每覽前賢述作道門異事率多汎濫罕究根源臣夙夜精心討尋經錄採摭事實形於篇章久歷歲時頗盈編軸今撰成玉清縱極圖洞天五嶽圖蓬壺闈苑圖大淇靈漬圖名山福地圖金液還丹圖幸逢昭代不敢藏於蝸室輒思上達龍庭若得少經睿覽即臣生平苦辛不為虛棄輒敢隨表進呈干犯冕旎無任戰汗憂兢悚惕屏營之至臣誠惶誠懼頓首頓首謹言
