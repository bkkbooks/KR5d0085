body:
  text: 宋皇祐元年十二月日虔州祥符官道士臣李思聰狀奏乞進洞天海嶽名山圖狀虔州大中祥符宮道士李思聰右思聰草野微軀生逢昌運長遇無為之教叨居有道之朝性愚罔究於仙書智淺曷量於淇渤以思聰自明道元年相次於道門祕典列聖真詮探蹟幽微精究妙本撰成玉虛遊極圖述虛無旋象之神化洞天五嶽圖贊五嶽仙山之靈境蓬壺闈苑圖頌蓬島十洲之勝槃大淇靈漬圖序龍宮海讀之奧妙名山福地圖吟紫府丹臺之祕景金液還丹圖集神仙之火候其圖廣大慮煩尋繹又別纂集臥披圖一十軸並已了畢念以思聰採摭事實刻苦彌年柢願美贊於皇猷豈敢叨求於帝渥今遇乾元節將近擬乞以前件圖子陸本並臥披圖一十軸具狀通納乞與進呈者右具如前所據道士李思聰狀陳述前項外臣良肱與當州眾官體訪得道士李思聰潛精道行積思仙書歲紀浸深功勞備著蓬山洞府之詠玉清遊極之言纂為畫圖贊之詩序英辭昭灼妙格清新宜備睿觀以暢真教況乾元慶旦方貢盈庭惟妙本於高仙願同符於聖籌儻隨旅幣得觀凝旎傾切之心庶獲聞達其玉清遊極等圖各有詩序命辭措意實有可採當州見今收掌未敢進呈伏候勃旨中書劉子付昭信軍虔州奏大中祥符宮道士李思聰狀自明道元年相次於道門祕典列聖真詮採蹟幽微精窮妙本撰成玉清遊極圖述虛無遊象之神化洞天五嶽圖贊五嶽仙山之靈境蓬壺閱苑圖頌蓬島十洲之勝槃大瞑靈讀圖著龍宮海漬之奧妙名山福地圖吟紫府丹臺之祕典金液還丹圖集神仙之火候圖子六面並臥披圖一十軸乞與進呈當州眾官看詳實可採其圖見在本州收掌未敢上進伏候勁旨右奉聖旨宜令虔州入遞進呈付虔州準此皇祐二年三月二十七日
